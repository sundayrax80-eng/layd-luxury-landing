<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Lay'd Luxury Co.</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, Arial, sans-serif;

      body {
        margin: 0;
        background: #fff8f4;
        color: #1f1a17;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      .card {
        max-width: 640px;
        background: white;
        border-radius: 24px;
        padding: 2.25rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        text-align: center;
      }
      h1 {
        font-size: 2rem;
        margin: 0 0 1rem;
        color: #121212;
      }
      p {
        font-size: 1rem;
        line-height: 1.7;
        color: #4b4b4b;
      }
      a {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.9rem 1.35rem;
        border-radius: 999px;
        background: #ff4f91;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Your Wholesale Inquiry Was Sent!</h1>
        <p>
          Thank you for reaching out to Lay’d Luxury Co. We received your inquiry and will follow up soon about wholesale orders, local reorders, or store placement.
        </p>
        <a href="/">Back to Home</a>
      </section>
    </main>
  </body>
</html>
